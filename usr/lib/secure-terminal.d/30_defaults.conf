## secure-terminal settings -- built-in vendor defaults (override in a
## higher tier below; do NOT edit this packaged file directly).
##
## Settings are KEY=value lines spread over *.conf drop-in files, the systemd .d
## way. They are read from three directories, lowest precedence first:
##
##   /usr/lib/secure-terminal.d/*.conf          (this file: built-in defaults)
##   /etc/secure-terminal.d/*.conf              (system administrator)
##   /usr/local/etc/secure-terminal.d/*.conf    (local administrator)
##   ~/.config/secure-terminal.d/*.conf         (user, highest precedence)
##
## Within a directory, files apply in lexical order (10_*.conf before 90_*.conf);
## across directories, lower to higher. Normally the USER wins over the system.
##
## EXCEPTION -- hardening: a privileged directory (/etc or /usr/local/etc) may
## LOCK a key so the user CANNOT override it (see the "Hardening" section at the
## bottom). Locking is only honored from the privileged directories; a user
## config can neither lock nor unlock.
##
## Every setting below is shown COMMENTED OUT at its built-in default. Uncomment
## and edit a line to change the system default. Unknown keys and malformed lines
## are ignored (never fatal). The application writes the user's own choices to
## ~/.config/secure-terminal.d/50_user.conf; locked keys are never written there.

## ---------------------------------------------------------------- display -----

## unicode_mode -- how non-ASCII program output is displayed:
##   strip   safe; every non-ASCII byte becomes "_"
##   reveal  safe; each shown as a <U+XXXX> codepoint badge (hover for its name)
##   detail  safe default; the badge with the codepoint's Unicode name inline,
##           <U+XXXX NAME>, as unicode-show annotates
##   show    renders the glyph -- readable, but a look-alike can deceive the eye
#unicode_mode=detail

## colors -- honor a program's ANSI SGR colours. The palette is the bounded
## 16-colour set and a contrast guard keeps text readable. true|false
#colors=true

## colored_markings -- colour each neutralized/revealed character (the "_" and
## the <U+XXXX> badge) by its risk class (bidi red, invisible amber, control
## blue, other non-ASCII purple). On by default; independent of `colors`.
#colored_markings=true

## auto_tab_colors -- give each new tab a colour that differs from its
## neighbour, so tabs are easy to tell apart. A colour set on a tab overrides
## the automatic one. true|false
#auto_tab_colors=true

## osc_notice -- show a dismissible banner (at most once per OSC TYPE per tab)
## when a program uses an OSC escape that the safe CLI mode neutralized, so the
## attempt is visible rather than silent. true|false
#osc_notice=true
##
## osc_notice_off -- mute the notice for specific OSC types only (the types are
## still neutralized; you just are not told). Comma-separated feature keys, e.g.
## osc_title,osc_cwd. Empty = notify about every type.
#osc_notice_off=

## ---------------------------------------------------------- OSC features ------
##
## OSC (Operating System Command) escapes let a program reach OUT of the terminal
## grid: rename the window, write your clipboard, make hyperlinks, and so on. Each
## is a spoofing/exfiltration surface, so EVERY one is NEUTRALIZED by default. You
## may enable any of them individually here, at your own risk; a program using an
## enabled feature dims the security lamp (the riskier the feature, the more).
##
## osc_title -- OSC 0/2: let a program set the window/tab title (sanitized to
## ASCII). Risk: a spoofed title misleads; a title-report query can inject keys.
#osc_title=false
##
## osc_notify -- OSC 9: let a program raise a desktop notification (sanitized).
## Risk: the text can be faked ("session expired, run this ...").
#osc_notify=false
##
## osc_hyperlink -- OSC 8: render clickable hyperlinks. Risk: the visible text can
## differ from the real target (phishing); the true URL is shown on hover.
#osc_hyperlink=false
##
## osc_clipboard -- OSC 52: let a program write (or read) the system clipboard.
## HIGH RISK: a write means your next paste runs the program's command. Off.
#osc_clipboard=false
##
## osc_colors -- OSC 4/10/11/12: let a program change the palette / default
## colours. Risk: hide text (same colour as the background), or a lasting change.
#osc_colors=false
##
## osc_cwd -- OSC 7: let a program report its working directory (used for the tab).
## Low risk: discloses a path.
#osc_cwd=false
## osc_iterm2 -- OSC 1337: iTerm2 proprietary escapes (file upload/download, set
## variables). HIGH RISK, a very large surface. Off.
#osc_iterm2=false

## bell -- how a BEL (0x07) in program output is signalled. A comma-separated set
## of INDEPENDENT channels (any combination; empty = silent, the safe default --
## BEL from untrusted output is a nuisance/attention-grab surface). Rate-limited.
##   audible  a short system beep, or the bell_sound file if set
##   visual   flag the window for attention (a window-manager urgency hint / flash)
##   tray     a passive system-tray popup
## e.g. bell=audible,tray . The legacy single values off/audible/visual still work.
## Set per tab from the View > Bell menu; this is the default for new tabs.
#bell=

## bell_sound -- optional sound file for the audible bell (else a system beep).
## Accepted ONLY inside an allowed directory (/usr/share/sounds,
## /usr/share/secure-terminal/sounds, ~/.local/share/sounds) so the AppArmor
## profile stays enforceable; a path outside them is ignored.
#bell_sound=

## keybindings -- override window keyboard shortcuts. Space-separated
## "ident=Sequence" pairs; an empty Sequence unbinds an action. Only overrides
## (differing from the built-in default) need be listed; edit them in the GUI via
## Help > Keyboard Shortcuts. These are WINDOW shortcuts only -- terminal control
## keys (Ctrl+C, Ctrl+U, ...) always go to the running program and are not
## remappable. Idents: new_tab, new_command_tab, close_tab, save_transcript,
## terminate, quit, copy, paste, select_all, zoom_in, zoom_out, zoom_reset,
## fullscreen, command_palette, shortcuts_help.
#keybindings=

## theme -- dark|light
#theme=dark

## zoom -- font zoom percent (10-1000)
#zoom=100

## scrollback -- retained lines (0 = unlimited); a bounded window is safer
#scrollback=10000

## paste_delay -- seconds the "Paste with unicode" button stays disabled, so a
## stray Enter cannot wave a hostile paste through (0-60)
#paste_delay=3

## ------------------------------------------------------------- opt-in TUI -----

## tui -- default new tabs to TUI mode (interprets escapes through a confined
## pyte screen so ssh/vim/htop work). Off by default; the strict line mode is the
## safe default. true|false
#tui=false

## cli_terminfo -- advertise the restricted "secure-terminal" terminfo entry to
## programs instead of xterm-256color, so CLI-mode programs emit only what this
## terminal renders (line-local moves + colour) and NEVER probe it (no cursor
## addressing, alternate screen, or capability queries). Off by default. TERM is
## fixed when a shell starts, so this applies to NEW tabs. Keep it OFF if you ssh
## or use TUI mode: a remote host or full-screen program needs the fuller
## xterm-256color entry (which this terminal keeps safe by stripping in the
## renderer regardless of TERM). true|false
#cli_terminfo=false

## allow_title -- let a program set the tab title (OSC 0/2) and send notifications
## (OSC 9), sanitized to plain ASCII. Only has effect in TUI mode. true|false
#allow_title=false

## ------------------------------------------------------- session + plugins ----

## persist_session -- restore tabs and scrollback on next start. true|false
#persist_session=true

## command_hook -- OPTIONAL plugin: an external handler that judges a command
## before it runs in line mode (see the /plugins page). Empty = no plugin. Set to
## an executable, e.g. /usr/share/secure-terminal/hooks/example-hook
#command_hook=
#command_hook_timeout=10
#command_hook_transcript=none          ## none|ask
#command_hook_on_error=allow           ## allow|block (fail open or closed)
##
## The example hooks read their PROMPT and allow/block/ask RULES from these
## sibling files (documented, editable across the tiers, home only if allowed):
##   ai-judge-prompt.txt        the AI classifier prompt
##   ai-judge-allow.conf        commands allowed without calling the AI (ls, ...)
##   example-hook-rules.conf    the block/ask command rules
##   hooks.conf                 hook_config_allow_user (let home override; def no)

## remote_control -- allow `secure-terminal ctl` to list tabs, rename a tab, read
## a tab's rendered text (dump-tab, for tests), and SEND TEXT into an existing tab
## (as if typed) over the owner-only instance socket. An injection/read surface,
## so it is OFF by default and is
## PRIVILEGED-ONLY: it can be enabled here (or in /usr/local/etc) but NOT from a
## user's ~/.config -- a home setting is ignored and a warning is shown. Injected
## text is still sanitized like a paste. true|false
#remote_control=false

## --------------------------------------------------------------- Hardening ----
##
## `lock` lists keys the user may NOT override. Put it in a privileged directory
## only (this file, or /usr/local/etc). The value enforced is the one set here
## (or the built-in default); a user drop-in that sets a locked key is ignored and
## the app shows a warning. The matching UI controls are greyed out.
##
## Example -- a hardened / corporate lockdown: no plugins, no TUI mode, no
## colours, display mode forced to the safe "strip". Uncomment to apply:
#command_hook=
#tui=false
#colors=false
#unicode_mode=strip
#lock=command_hook,tui,colors,unicode_mode

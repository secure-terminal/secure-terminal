## example-hook: the allow / block / ask command policy, as documented rules.
## Fields are separated by " | " (space-pipe-space), so a regex alternation like
## (curl|wget) -- whose pipe has NO surrounding spaces -- is not split.
##   verdict | python-regex | message | suggestion(optional, block only)
##   verdict: block (refuse), ask (confirm first), allow (explicitly permit)
##   regex:   matched against the typed command line (re.search)
## First matching rule wins; no match -> allow. Blank lines and #-comments are
## ignored. Override by placing your own example-hook-rules.conf in a higher tier.
block | \b(curl|wget|fetch)\b.*\|\s*sudo\s+(ba)?sh\b | Refusing to pipe a downloaded script into a root shell.
ask | \b(curl|wget|fetch)\b.*\|\s*(ba)?sh\b | This pipes a downloaded script straight into a shell. Read it first.
block | \b(cat|tac|zcat|xzcat|bzcat|head|tail|xxd|base64|dd)\b.*\|\s*sudo\s+(ba)?sh\b | Refusing to pipe a file straight into a root shell -- its contents would run as root.
ask | \b(cat|tac|zcat|xzcat|bzcat|head|tail|xxd|base64|dd)\b.*\|\s*(ba)?sh\b | This pipes a file straight into a shell -- its contents run as commands. Read it first.
ask | \b(ba)?sh\b\s+<\( | This runs the output of a command as a script (process substitution). Read it first.
ask | \bgit\s+push\b.*(--force|(\s|=)-f\b) | A force-push can overwrite history on the remote.
ask | ^\s*sudo\b | This runs with root privileges.

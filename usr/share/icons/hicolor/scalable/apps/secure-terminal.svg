<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- terminal body: a plain rounded panel, no window-decoration chrome -->
  <rect x="12" y="18" width="104" height="92" rx="14" ry="14" fill="#14161b" stroke="#3a3f4b" stroke-width="3"/>
  <!-- prompt: a chevron and a cursor block, the universal terminal mark -->
  <path d="M30 46 l20 15 -20 15" fill="none" stroke="#2ab0a0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="58" y="66" width="30" height="9" rx="2.5" fill="#e6e6e6"/>
  <!-- shield badge for "secure", bottom-right -->
  <g transform="translate(74,58)">
    <path d="M21 3 L40 10 V28 C40 43 31 51 21 55 C11 51 2 43 2 28 V10 Z" fill="#1f8a54" stroke="#0f4d2f" stroke-width="2.5"/>
    <path d="M12 29 l6 6 13 -15" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
